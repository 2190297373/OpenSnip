name: Build and Release

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

  build:
    needs: check
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app (release)
        if: startsWith(github.ref, 'refs/tags/')
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: "OpenSnip v__VERSION__"
          releaseBody: |
            <p align="center">
              <img src="https://github.com/2190297373/OpenSnip/raw/master/assets/banner.png" width="100%"/>
            </p>

            ---

            ## ✨ Features

            - 📸 **Instant Screenshot** — Fullscreen, region, window capture
            - ✏️ **Annotation Tools** — Rectangle, arrow, text, pencil, mosaic
            - 📌 **Pin Window** — Always-on-top floating screenshot with mouse-through
            - 💾 **Export & Copy** — Save as PNG, copy to clipboard
            - ↩️ **Undo & Redo** — Full history support
            - 🌐 **Translation** — Multi-language translation (MyMemory API)

            ---

            ## 📦 Download

            👉 **Recommended**
            - `OpenSnip___VERSION___x64-setup.exe` — NSIS Installer

            👉 **Other**
            - `OpenSnip___VERSION___x64_en-US.msi` — MSI Standard Installer

            ---

            ## 🎬 Preview

            > GIF demo placeholder (screenshot → annotate → pin)

            ---

            ## ⌨️ Shortcuts

            | Shortcut | Function |
            |----------|----------|
            | `Ctrl + Alt + A` | Region screenshot |
            | `Ctrl + Alt + S` | Scroll screenshot |
            | `Ctrl + Alt + R` | Screen recording |
            | `Esc` | Cancel capture |
            | `Ctrl + Z` | Undo |
            | `Ctrl + Shift + Z` | Redo |

            ---

            ## 🗺 Roadmap

            - [x] v0.1.0 — Core screenshot + annotation + pin
            - [x] v1.0.0 — Stable release with installer
            - [ ] v1.1.0 — Blur & Mosaic
            - [ ] v1.2.0 — Auto update
            - [ ] v2.0.0 — OCR + Recording

            ---

            ## ⭐ Support

            If you like this project, please give it a star ⭐

            ---

            ## 📄 License

            [MIT License](LICENSE)
          releaseDraft: false
          prerelease: false

      - name: Build Tauri app (debug/artifact only)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        run: npm run tauri build

      - name: Upload artifacts
        if: github.event_name != 'push' || !startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: OpenSnip-build
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: warn
